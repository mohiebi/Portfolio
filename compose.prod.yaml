services:
  app:
    image: ghcr.io/mohiebi/portfolio:latest
    container_name: portfolio-app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mariadb
      DB_PORT: 3306
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - storage-data:/var/www/html/storage/app
      - storage-logs:/var/www/html/storage/logs
    networks:
      - portfolio-net

  mariadb:
    image: mariadb:11.4
    container_name: portfolio-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE:-portfolio_db}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

volumes:
  mariadb-data:
  storage-data:
  storage-logs:

networks:
  portfolio-net:
    driver: bridge

name: Build and deploy Laravel app to Azure Web App - mohi

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: mohi
  PHP_VERSION: '8.4'
  NODE_VERSION: '24'

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml, zip
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate Composer files
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare Laravel deployment package
        run: |
          mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env" \
            -x "auth.json" \
            -x "node_modules/*" \
            -x "release.zip" \
            -x "tests/*" \
            -x "storage/logs/*" \
            -x "storage/framework/views/*.php" \
            -x "storage/framework/cache/data/*"

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

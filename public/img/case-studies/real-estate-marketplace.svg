<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Real Estate marketplace interface cover</title>
  <desc id="desc">Static portfolio cover showing filters and listing cards for a Laravel and Vue real estate marketplace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07151b"/>
      <stop offset="0.48" stop-color="#0b1f2a"/>
      <stop offset="1" stop-color="#102331"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="42" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="190" cy="130" r="260" fill="#2dd4bf" opacity="0.12"/>
  <circle cx="1370" cy="780" r="330" fill="#38bdf8" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="150" y="110" width="1300" height="780" rx="34" fill="#071220" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="150" y="110" width="1300" height="78" rx="34" fill="#0b1b25"/>
    <circle cx="205" cy="149" r="10" fill="#fb7185"/>
    <circle cx="236" cy="149" r="10" fill="#fbbf24"/>
    <circle cx="267" cy="149" r="10" fill="#34d399"/>
    <text x="800" y="157" text-anchor="middle" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">/listing</text>
    <g transform="translate(215 250)">
      <text x="0" y="0" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700">Property marketplace</text>
      <text x="0" y="48" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="24">Browse, filter, offer, and manage listings.</text>
      <g transform="translate(0 100)">
        <rect x="0" y="0" width="170" height="50" rx="25" fill="#2dd4bf" fill-opacity="0.13" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <text x="85" y="32" text-anchor="middle" fill="#99f6e4" font-family="Inter, Arial, sans-serif" font-size="18">2+ beds</text>
        <rect x="190" y="0" width="210" height="50" rx="25" fill="#2dd4bf" fill-opacity="0.13" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <text x="295" y="32" text-anchor="middle" fill="#99f6e4" font-family="Inter, Arial, sans-serif" font-size="18">Under $500k</text>
        <rect x="420" y="0" width="160" height="50" rx="25" fill="#2dd4bf" fill-opacity="0.13" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <text x="500" y="32" text-anchor="middle" fill="#99f6e4" font-family="Inter, Arial, sans-serif" font-size="18">Austin</text>
      </g>
    </g>
    <g transform="translate(215 470)">
      <g>
        <rect width="520" height="250" rx="28" fill="#0c1823" stroke="#ffffff" stroke-opacity="0.10"/>
        <rect width="520" height="132" rx="28" fill="url(#cardA)"/>
        <text x="34" y="185" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">$480,000</text>
        <text x="34" y="222" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">3 bd | 2 ba | Austin</text>
        <circle cx="468" cy="185" r="22" fill="#2dd4bf" fill-opacity="0.14"/>
      </g>
      <g transform="translate(560 0)">
        <rect width="520" height="250" rx="28" fill="#0c1823" stroke="#ffffff" stroke-opacity="0.10"/>
        <rect width="520" height="132" rx="28" fill="url(#cardB)"/>
        <text x="34" y="185" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">$320,000</text>
        <text x="34" y="222" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">2 bd | 1 ba | Denver</text>
        <circle cx="468" cy="185" r="22" fill="#38bdf8" fill-opacity="0.14"/>
      </g>
    </g>
  </g>
</svg>
